[platformio]
default_envs = ifan04_ota

[env:ifan04_serial]
platform = espressif8266
board = esp8285
framework = arduino
; Generated by Copilot: 1MB flash split optimized for OTA program size.
board_build.ldscript = eagle.flash.1m64.ld
monitor_speed = 9600
; Generated by Copilot
upload_speed = 115200
extra_scripts = pre:extra_scripts/load_env.py
lib_deps =
  fastled/FastLED @ ^3.9.15
build_flags =
  ; Generated by Copilot: prefer code size over speed on constrained flash.
  -Os
  -D SERIAL_BAUD=9600
  -D REMOTE_SIGNAL_BAUD=9600
  -D REMOTE_SIGNAL_RX_PIN=3

[env:ifan04_ota]
extends = env:ifan04_serial
upload_protocol = espota
upload_port = 192.168.178.150
; Generated by Copilot: Pin OTA handshake to the correct local interface/IP.
upload_flags =
  --host_ip=192.168.178.149
  --host_port=18123
  --port=8266
  --debug
  --progress
